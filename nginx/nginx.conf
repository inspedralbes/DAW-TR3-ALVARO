events {
    worker_connections 1024;
}

http {
    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name ticketmonster.daw.inspedralbes.cat;

        # Allow certbot challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Main Server
    server {
        listen 443 ssl;
        server_name ticketmonster.daw.inspedralbes.cat;

        ssl_certificate /etc/letsencrypt/live/ticketmonster.daw.inspedralbes.cat/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ticketmonster.daw.inspedralbes.cat/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # --- Laravel API ---
        location /api/ {
            proxy_pass http://api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Socket.IO WebSockets ---
        location /socket.io/ {
            proxy_pass http://websockets:3001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # --- Nuxt Frontend (catch-all) ---
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
