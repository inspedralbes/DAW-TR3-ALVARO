version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: ticket_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - api
      - websockets

  frontend:
    environment:
      - NUXT_PUBLIC_API_URL=https://ticketmonster.daw.inspedralbes.cat
      - NUXT_PUBLIC_WS_URL=https://ticketmonster.daw.inspedralbes.cat
      - HOST=0.0.0.0

  api:
    environment:
      - APP_URL=https://ticketmonster.daw.inspedralbes.cat
      - APP_ENV=production
      - APP_DEBUG=false
