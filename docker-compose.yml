version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ticket_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ticket_platform
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Script de inicialización de la BD
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_backend
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=ticket_platform
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket_frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NUXT_PUBLIC_API_URL=http://localhost:3001
      - HOST=0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt
    command: npm run dev

volumes:
  db_data:
  backend_node_modules:
  frontend_node_modules:
  frontend_nuxt:
